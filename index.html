<!DOCTYPE html>
<html lang="en" ng-app="campus360">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="node_modules/angular/angular.min.js"></script>
    <script src="js/app.js"></script>

    <title>Campus360</title>

    <style>

        body{
            font-family:Arial;
            background:#f5f5f5;
        }

        .form-box{
            width:450px;
            margin:auto;
            margin-top:40px;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        input{
            width:100%;
            padding:8px;
            margin-top:5px;
            margin-bottom:10px;
        }

        button{
            width:100%;
            padding:10px;
            background:green;
            color:white;
            border:none;
            cursor:pointer;
        }

        h2,h3{
            text-align:center;
        }

    </style>

</head>

<body ng-controller="dashboardcontroller">

<div class="form-box">

    <h2>{{collegename}}</h2>

    <h3>Total Students : {{totalstudents}}</h3>

    <label>Student Name</label>
    <input type="text" ng-model="studname">

    <p><b>Name :</b> {{studname}}</p>

    <label>Age</label>
    <input type="number" ng-model="stdage">

    <p><b>Age :</b> {{stdage}}</p>

    <label>Class</label>
    <input type="text" ng-model="stdclass">

    <p><b>Class :</b> {{stdclass}}</p>

    <button type="button" ng-click="addstudent()">
        Submit
    </button>

    <hr>

    <h3>Student List</h3>

    <ul>
        <li ng-repeat="student in students track by $index">
            {{$index+1}}. {{student}}
        </li>
    </ul>

</div>

</body>
</html>
