<!DOCTYPE html>
<html lang="en" ng-app="campus360">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="node_modules/angular/angular.min.js"></script>
    <script src="js/app.js"></script>

    <title>Campus360</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        .form-box {
            width: 450px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h2,
        h3 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        .submit-btn {
            background: green;
        }

        .show-btn {
            background: blue;
        }

        ul {
            margin-top: 10px;
        }
    </style>

</head>

<body ng-controller="dashboardcontroller">

    <div class="form-box">

        <h2>{{collegename}}</h2>

        <label>Student Name</label>
        <input type="text" ng-model="studname">

        <label>Age</label>
        <input type="number" ng-model="stdage">

        <label>Class</label>
        <input type="text" ng-model="stdclass">

        <button class="submit-btn"
                type="button"
                ng-click="addstudent()">
            Submit
        </button>

        <button class="show-btn"
                type="button"
                ng-click="showData=!showData">
            {{showData ? 'Hide Details' : 'Show Details'}}
        </button>

        <hr>

        <div ng-show="showData">

            <h3>Total Students : {{totalstudents}}</h3>

            <h3>Entered Student Details</h3>

            <p><b>Name:</b> {{studname}}</p>
            <p><b>Age:</b> {{stdage}}</p>
            <p><b>Class:</b> {{stdclass}}</p>

            <h3>Student List</h3>

            <ul>
                <li ng-repeat="student in students">
                    {{$index + 1}}. {{student}}
                </li>
            </ul>

        </div>

    </div>

</body>

</html>
